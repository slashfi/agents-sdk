# Verdaccio config for e2e testing
# Allows unauthenticated publish for local testing

storage: /tmp/verdaccio-storage

auth:
  htpasswd:
    file: /tmp/verdaccio-htpasswd
    max_users: 100

uplinks:
  npmjs:
    url: https://registry.npmjs.org/

packages:
  '@agentdef/*':
    access: $all
    publish: $all
    unpublish: $all
  '@slashfi/*':
    access: $all
    publish: $all
    proxy: npmjs
  '**':
    access: $all
    proxy: npmjs

server:
  keepAliveTimeout: 60

logs:
  type: stdout
  format: pretty
  level: warn
