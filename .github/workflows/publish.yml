name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 24 + npm 11.5.1+ required for OIDC trusted publishing if we
      # switch later; also keeps npm current for token-based publish.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@latest

      # Remove workspaces before install to avoid resolving example deps
      - run: |
          node -e "
            const pkg = require('./package.json');
            delete pkg.workspaces;
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          bun install

      - run: bun run build

      - name: Verify npm auth (rotate NPM_TOKEN if this fails)
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
