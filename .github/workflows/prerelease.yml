name: Publish Prerelease

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  prerelease:
    runs-on: ubuntu-latest
    # Only run on workflow_dispatch OR when "prerelease" label is added
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'prerelease')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Remove workspaces before install (same as publish.yml)
      - run: |
          node -e "
            const pkg = require('./package.json');
            delete pkg.workspaces;
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          bun install

      - run: bun run build

      - run: bun test

      # Auto-version: base-version + PR number + short SHA
      - name: Set prerelease version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PR_NUM=${{ github.event.pull_request.number || 'dev' }}
          SHA=$(git rev-parse --short HEAD)
          PRERELEASE_VERSION="${VERSION}-pr.${PR_NUM}.${SHA}"
          npm version "${PRERELEASE_VERSION}" --no-git-tag-version
          echo "Published version: ${PRERELEASE_VERSION}"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
